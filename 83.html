<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Độ Mixi Fan Quiz 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8192C;--dark-red:#A01020;--yellow:#FFD700;
  --dark:#0A0A0A;--dark2:#141414;--dark3:#1E1E1E;--dark4:#282828;
  --white:#F2EDE4;--gray:#666;--gray2:#999;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --err:#ef4444;--err-bg:rgba(239,68,68,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--dark);color:var(--white);font-family:'Nunito',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,25,44,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,25,44,.04) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}

.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;opacity:0;pointer-events:none;transition:opacity .4s ease,transform .4s ease;transform:translateY(20px);overflow-y:auto;}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* ── INTRO ── */
#screen-intro{flex-direction:column;text-align:center;padding:20px;}
.intro-mixi-wrap{position:relative;display:inline-block;margin-bottom:24px;}
.intro-mixi-img{width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid var(--red);box-shadow:0 0 0 3px var(--yellow),0 0 50px rgba(232,25,44,.5);display:block;cursor:pointer;transition:transform .2s;}
.intro-mixi-img:hover{transform:scale(1.05);}
.intro-img-edit{position:absolute;bottom:6px;right:6px;background:var(--yellow);color:var(--dark);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5);border:2px solid var(--dark);}
.intro-title{font-family:'Oswald',sans-serif;font-size:clamp(38px,9vw,64px);font-weight:900;line-height:.92;text-transform:uppercase;letter-spacing:2px;}
.intro-title .red{color:var(--red);}.intro-title .yellow{color:var(--yellow);}
.intro-sub{color:var(--gray2);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:14px 0 32px;}
.btn-start{background:var(--red);color:var(--white);border:none;font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:16px 50px;border-radius:50px;cursor:pointer;animation:pulseShadow 2s ease infinite;transition:transform .2s,background .2s;}
.btn-start:hover{background:var(--dark-red);transform:scale(1.05);}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 0 0 rgba(232,25,44,.4)}50%{box-shadow:0 0 0 18px rgba(232,25,44,0)}}
.intro-badge{margin-top:26px;background:var(--dark3);border:1px solid #333;border-radius:8px;padding:10px 20px;font-size:13px;color:var(--gray2);display:inline-flex;align-items:center;gap:8px;}

/* ── QUESTION ── */
#screen-question{flex-direction:column;align-items:stretch;padding:0;overflow-y:auto;}
.q-layout{display:flex;flex-direction:column;min-height:100vh;width:100%;max-width:560px;margin:0 auto;align-items:center;justify-content:center;padding:32px 24px 40px;}
.q-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;width:100%;}
.q-dot{width:10px;height:10px;border-radius:50%;background:var(--dark4);border:2px solid #333;transition:all .3s;}
.q-dot.answered-ok{background:var(--green);border-color:var(--green);}
.q-dot.answered-wrong{background:var(--err);border-color:var(--err);}
.q-dot.current{background:var(--red);border-color:var(--red);transform:scale(1.35);}
.q-label{font-size:11px;letter-spacing:3px;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:10px;width:100%;}
.q-text{font-family:'Oswald',sans-serif;font-size:clamp(20px,2.8vw,28px);font-weight:600;line-height:1.35;margin-bottom:20px;color:var(--white);width:100%;}
.q-hero-img-wrap{width:100%;margin-bottom:20px;border-radius:14px;position:relative;box-shadow:0 6px 30px rgba(0,0,0,.5);display:none;background:var(--dark3);border:1px solid #2a2a2a;overflow:hidden;}
.q-hero-img-wrap.has-img{display:block;}
.q-hero-img{width:100%;max-height:240px;object-fit:contain;object-position:center;display:block;padding:12px;background:var(--dark3);}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.opt{background:var(--dark3);border:1.5px solid #2a2a2a;border-radius:12px;padding:16px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .22s;font-size:14px;font-weight:700;text-align:left;color:var(--white);width:100%;min-height:62px;word-break:break-word;}
.opt:hover:not(.picked):not([disabled]){border-color:var(--yellow);background:#1e1d09;transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,215,0,.12);}
.opt.picked{border-color:var(--red);background:rgba(232,25,44,.12);box-shadow:0 0 0 1px var(--red);}
.opt-letter{width:30px;height:30px;border-radius:8px;background:var(--dark4);color:var(--gray2);font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .22s;}
.opt.picked .opt-letter{background:var(--red);color:var(--white);}
.q-nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:24px;width:100%;}
.btn-confirm{background:var(--red);color:var(--white);border:none;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 32px;border-radius:8px;cursor:pointer;transition:all .2s;opacity:.35;pointer-events:none;margin-left:auto;}
.btn-confirm.enabled{opacity:1;pointer-events:all;}
.btn-confirm.enabled:hover{background:var(--dark-red);transform:translateY(-2px);}

/* ── POPUP ANSWER ── */
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center;padding:20px;}
.popup-bg.open{display:flex;animation:fadeIn .25s ease;}
.popup-box{background:var(--dark2);border-radius:24px;max-width:400px;width:100%;position:relative;overflow:hidden;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{from{transform:scale(.5) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Popup image area */
.popup-img-area{position:relative;width:100%;height:200px;overflow:hidden;background:var(--dark3);}
.popup-img-area img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:opacity .3s;}

/* Glow border on image area based on result */
.popup-img-area.is-correct{box-shadow:inset 0 0 0 3px var(--green);}
.popup-img-area.is-wrong{box-shadow:inset 0 0 0 3px var(--err);}

/* Edit button for each image */
.popup-img-edit-btn{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.7);color:var(--yellow);
  border:1.5px solid var(--yellow);border-radius:8px;
  font-size:11px;font-weight:700;padding:5px 11px;
  cursor:pointer;backdrop-filter:blur(4px);
  letter-spacing:.5px;
  transition:background .2s;
}
.popup-img-edit-btn:hover{background:rgba(255,215,0,.15);}

/* Answer badge overlapping bottom of image */
.popup-badge{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;
  padding:8px 28px;border-radius:30px;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:2;
}
.popup-badge.correct{background:var(--green);color:#fff;}
.popup-badge.wrong{background:var(--err);color:#fff;}

.popup-body{padding:30px 24px 24px;}
.popup-q-text{font-size:13px;color:var(--gray2);margin-bottom:10px;line-height:1.4;}
.popup-answer-row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.popup-ans{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:700;}
.popup-ans.correct-ans{background:var(--green-bg);border:1.5px solid var(--green);color:var(--green);}
.popup-ans.wrong-ans{background:var(--err-bg);border:1.5px solid var(--err);color:var(--err);}
.popup-ans-icon{font-size:16px;flex-shrink:0;}
.popup-joke{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--yellow);font-weight:700;font-style:italic;margin-bottom:14px;}
.popup-next-btn{width:100%;background:var(--red);color:var(--white);border:none;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:14px;border-radius:10px;cursor:pointer;transition:all .2s;}
.popup-next-btn:hover{background:var(--dark-red);}
.popup-next-btn.last{background:var(--yellow);color:var(--dark);}
.popup-next-btn.last:hover{background:#e6c200;}

/* ── RESULTS ── */
#screen-results{flex-direction:column;padding:20px;overflow-y:auto;align-items:flex-start;}
.results-inner{max-width:600px;width:100%;margin:auto;padding:36px 0;}
.res-header{text-align:center;margin-bottom:32px;}
.res-score-big{font-family:'Oswald',sans-serif;font-size:clamp(64px,14vw,96px);font-weight:900;line-height:1;color:var(--yellow);}
.res-score-big span{font-size:38%;color:var(--gray2);}
.res-title{font-family:'Oswald',sans-serif;font-size:clamp(22px,4.5vw,34px);font-weight:700;margin:8px 0 6px;text-transform:uppercase;}
.res-sub{color:var(--gray2);font-size:15px;margin-bottom:8px;}
.reward-box{text-align:center;margin-bottom:28px;background:var(--dark2);border:1px solid #2a2a2a;border-radius:20px;padding:28px 20px;position:relative;overflow:hidden;}
.reward-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,.07) 0%,transparent 70%);pointer-events:none;}
.reward-label{font-size:12px;letter-spacing:3px;color:var(--gray2);text-transform:uppercase;margin-bottom:16px;}
.reward-img-wrap{position:relative;width:190px;height:190px;margin:0 auto 10px;cursor:pointer;}
.reward-img{width:100%;height:100%;object-fit:contain;border-radius:16px;border:2px solid #2a2a2a;background:#0d0d0d;display:block;}
.reward-upload-overlay{position:absolute;inset:0;border-radius:16px;background:rgba(0,0,0,.65);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border:2px dashed var(--yellow);}
.reward-img-wrap:hover .reward-upload-overlay{opacity:1;}
.reward-upload-overlay span{color:var(--yellow);font-size:12px;font-weight:700;margin-top:4px;}
.reward-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--yellow);margin-bottom:4px;}
.reward-hint{font-size:11px;color:var(--gray);margin-top:6px;}
.reward-msg{font-size:14px;color:var(--gray2);line-height:1.6;margin-top:10px;}
.res-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.res-card{background:var(--dark2);border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;animation:fadeUp .4s ease both;padding:14px 18px;}
.res-card-qnum{font-size:10px;letter-spacing:2px;color:var(--gray);text-transform:uppercase;margin-bottom:3px;}
.res-card-q{font-size:14px;font-weight:700;margin-bottom:7px;line-height:1.4;}
.res-answer-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.pill{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;}
.pill.your-correct{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.pill.your-wrong{background:var(--err-bg);color:var(--err);border:1px solid var(--err);}
.pill.correct-ans{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.res-card-joke{margin-top:8px;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--yellow);font-weight:700;font-style:italic;}
.res-btns{display:flex;gap:12px;justify-content:center;}
.btn-restart{background:var(--dark3);color:var(--white);border:1.5px solid #333;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;padding:14px 32px;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-restart:hover{border-color:var(--white);}

input[type=file]{display:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<!-- ════════ INTRO ════════ -->
<div class="screen active" id="screen-intro">
  <div>
    <div class="intro-mixi-wrap">
      <img class="intro-mixi-img" id="intro-mixi-img"
        src="https://memetrend.vn/wp-content/uploads/2025/07/meme-do-mixi-20.webp"
        alt="Độ Mixi"
        onclick="document.getElementById('file-intro').click()"
      />
      <div class="intro-img-edit" onclick="document.getElementById('file-intro').click()">📷</div>
      <input type="file" id="file-intro" accept="image/*" onchange="changeImg('intro-mixi-img',this)"/>
    </div>
    <h1 class="intro-title">
      <span class="red">Test</span>
      Độ<span class="yellow">Moi</span>
    </h1>
    <p class="intro-sub">Thử thách dành cho Bộ Tộc MixiGaming</p>
    <div style="text-align:center">
      <button class="btn-start" onclick="startQuiz()">BẮT ĐẦU NGAY </button>
    </div>
    <div style="text-align:center">
      <div class="intro-badge">Sẽ có phần thưởng sau khi hoàn thành test</div>
    </div>
  </div>
</div>

<!-- ════════ QUESTION ════════ -->
<div class="screen" id="screen-question">
  <div class="q-layout">
    <div class="q-progress-row" id="q-progress-row"></div>
    <div class="q-label" id="q-label">Câu hỏi 01</div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hero-img-wrap" id="q-hero-wrap">
      <img class="q-hero-img" id="q-img" src="" alt=""/>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <div class="q-nav-row">
      <div></div>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmAnswer()">✔ XÁC NHẬN</button>
    </div>
  </div>
</div>

<!-- ════════ POPUP: ANSWER FEEDBACK ════════ -->
<div class="popup-bg" id="popup-answer">
  <div class="popup-box">

    <!-- Image area: shows correct OR wrong image depending on answer -->
    <div class="popup-img-area" id="popup-img-area">

      <!-- ẢNH KHI ĐÚNG — click để đổi -->
      <img
        id="popup-img-correct"
        src="https://anhnail.vn/wp-content/uploads/2025/06/do-mixi-meme-15.webp"
        alt="Đúng rồi"
        style="display:none"
        onclick="document.getElementById('file-popup-correct').click()"
      />

      <!-- ẢNH KHI SAI — click để đổi -->
      <img
        id="popup-img-wrong"
        src="https://kenh14cdn.com/2020/3/30/90946436210539650170796825755815397818368n-1585513481630983665925-crop-15855905824381462323786.jpg"
        alt="Sai rồi"
        style="display:none"
        onclick="document.getElementById('file-popup-wrong').click()"
      />

      <!-- Nút đổi ảnh (hiện theo trạng thái) -->
      <button class="popup-img-edit-btn" id="popup-edit-btn" onclick="triggerImgEdit()">📷 Đổi ảnh</button>

      <!-- Badge đúng/sai -->
      <div class="popup-badge" id="popup-badge">✓ ĐÚNG RỒI!</div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="file-popup-correct" accept="image/*" onchange="changeImg('popup-img-correct',this)"/>
    <input type="file" id="file-popup-wrong"   accept="image/*" onchange="changeImg('popup-img-wrong',this)"/>

    <div class="popup-body">
      <div class="popup-q-text" id="popup-q-text"></div>
      <div class="popup-answer-row" id="popup-answer-row"></div>
      <div class="popup-joke" id="popup-joke" style="display:none"></div>
      <button class="popup-next-btn" id="popup-next-btn" onclick="nextQ()">Câu tiếp theo →</button>
    </div>
  </div>
</div>

<!-- ════════ RESULTS ════════ -->
<div class="screen" id="screen-results">
  <div class="results-inner">
    <div class="res-header">
      <div class="res-score-big" id="res-score-big">0<span>/5</span></div>
      <div class="res-title" id="res-title"></div>
      <div class="res-sub" id="res-sub"></div>
    </div>

    <div class="reward-box" id="reward-box">
      <div class="reward-label">🎁 Phần thưởng của bạn</div>
      <!-- KHÔ GÀ -->
      <div id="reward-khoga">
        <div class="reward-img-wrap" onclick="document.getElementById('file-khoga').click()">
          <img class="reward-img" id="khoga-img"
            src="https://p16-comment-sign-sg.tiktokcdn.com/tos-alisg-i-zt8igodiya-sg/085e50d5b5574d64ab6dccfc1a06deee~tplv-jj85edgx6n-image-origin.jpeg?dr=8569&refresh_token=6284512a&x-expires=1804600800&x-signature=qGXXeX6Hkem9mWks6kP3hwnSviU%3D&t=67a6c45e&ps=a0626fcd&shp=ff37627b&shcp=ff37627b&idc=my" alt="Khô gà"/>
          <div class="reward-upload-overlay">
            <span style="font-size:22px">📷</span><span>Đổi ảnh</span>
          </div>
        </div>
        <input type="file" id="file-khoga" accept="image/*" onchange="changeImg('khoga-img',this)"/>
        <div class="reward-name"> HỘP KHÔ GÀ</div>
        <div class="reward-msg">Fan cứng xứng đáng được nhận hộp khô gà</div>
      </div>
      <!-- BÃ MÍA -->
      <div id="reward-bamia" style="display:none">
        <div class="reward-img-wrap" onclick="document.getElementById('file-bamia').click()">
          <img class="reward-img" id="bamia-img"
            src="https://hopdungthucan.com/wp-content/uploads/2022/04/ndslv-510x342.jpg" alt="Bã mía"/>
          <div class="reward-upload-overlay">
            <span style="font-size:22px">📷</span><span>Đổi ảnh</span>
          </div>
        </div>
        <input type="file" id="file-bamia" accept="image/*" onchange="changeImg('bamia-img',this)"/>
        <div class="reward-name" style="color:var(--gray2)"> BÃ MÍA</div>
        <div class="reward-msg">Ôn lại kiến thức rồi thử lại để nhận khô gà nhé!</div>
      </div>
    </div>

    <div class="res-cards" id="res-cards"></div>
    <div class="res-btns">
      <button class="btn-restart" onclick="restartQuiz()">🔄 Chơi lại</button>
    </div>
  </div>
</div>

<script>
const LETTERS = ['A','B','C','D'];

// Track current popup state to know which file to trigger
let popupIsCorrect = false;

function triggerImgEdit(){
  document.getElementById(popupIsCorrect ? 'file-popup-correct' : 'file-popup-wrong').click();
}

const questionPool = [
  { img:'', text:'Tên thật của Độ Mixi là gì?', opts:['Phùng Thanh Độ','Nguyễn Thanh Độ','Trần Minh Độ','Lê Văn Độ'], correct:0, joke:'' },
  { img:'', text:'Độ Mixi sinh ra ở tỉnh nào?', opts:['Hà Nội','Cao Bằng','Hải Phòng','Đà Nẵng'], correct:1, joke:'' },
  { img:'', text:'Đội tuyển esport do Độ Mixi sáng lập có tên là gì?', opts:['Mixi Gaming','Bộ Tộc FC','Refund Gaming','500BROS'], correct:2, joke:'' },
  { img:'', text:'MV "Stream đến bao giờ" đạt Top mấy Trending YouTube Việt Nam?', opts:['Top 3','Top 5','Top 1','Top 10'], correct:2, joke:'' },
  { img:'', text:'Trong đợt lũ lụt miền Trung 2020, Độ Mixi kêu gọi được bao nhiêu tiền từ thiện?', opts:['500 triệu','1,2 tỷ đồng','800 triệu','2 tỷ đồng'], correct:1, joke:'' },
  { img:'', text:'Độ Mixi bắt đầu stream tựa game nào đầu tiên?', opts:['PUBG','Minecraft','CS:GO','Free Fire'], correct:2, joke:'' },
  { img:'', text:'Năm nào Độ Mixi lập kỷ lục 242.000 người xem khi stream vlog giới thiệu nhà?', opts:['2019','2020','2021','2022'], correct:1, joke:'' },
  { img:'', text:'Độ Mixi là người dân tộc gì?', opts:['Kinh','Mường','Nùng','Tày'], correct:3, joke:'' },
  { img:'', text:'Refund Gaming đạt thành tích gì tại PUBG Global Invitational 2018?', opts:['Vô địch giải','Top 1 chế độ FPP một lần','Top 3 toàn giải','Giải Fair Play'], correct:1, joke:'' },
  { img:'', text:'Độ Mixi tham gia chương trình truyền hình thực tế nào năm 2022?', opts:['Running Man','Sao nhập ngũ','Rap Việt','Siêu Trí Tuệ'], correct:1, joke:'' },
  { img:'', text:'Giải bóng đá Mixi Cup 2024 tổ chức ở sân vận động nào?', opts:['Mỹ Đình','Thống Nhất','Bà Rịa','Pleiku'], correct:2, joke:'' },
  { img:'', text:'Vợ của Độ Mixi tên là gì?', opts:['Trang Mixi','Hà Mixi','Linh Mixi','Mai Mixi'], correct:0, joke:'' },
  { img:'', text:'Năm 2020 Độ Mixi mua căn nhà mấy tầng ở Yên Lãng, Hà Nội?', opts:['5 tầng','6 tầng','7 tầng','8 tầng'], correct:2, joke:'' },
  { img:'', text:'MV "Stream đến bao giờ" được thực hiện cùng với ai?', opts:['Masew','HuyR','Pháo','Phúc Du'], correct:1, joke:'' },
  { img:'', text:'Độ Mixi nhận giải gì tại Nimo Global Gala 2024?', opts:['Best Streamer','Most Popular Game Streamer','Streamer of the Year','Rising Star'], correct:1, joke:'' },
  { img:'', text:'Năm 2021 Độ Mixi hoàn thành dự án gì ở quê hương Cao Bằng?', opts:['Xây trường học','Xây cầu từ thiện','Xây bệnh viện','Xây nhà văn hóa'], correct:1, joke:'' },
];

const fixedLast = {
  img:'https://tse4.mm.bing.net/th/id/OIP.4HtljSHEEP0KAV6evYI60AHaE8?rs=1&pid=ImgDetMain&o=7&rm=3',
  text:'Dựa vào hình ảnh bên dưới, anh Độ Mixi đang gọi điện cho ai?',
  opts:['Vũ','PewPew','HuyR','Cris Phan'],
  correct:0,
  joke:' Alo Vũ à Vũ~'
};

let questions=[], current=0, userAnswers=[], score=0;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildQuiz(){
  questions=[...shuffle(questionPool).slice(0,4), fixedLast];
  userAnswers=new Array(questions.length).fill(null);
  score=0;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  setTimeout(()=>document.getElementById(id).classList.add('active'),10);
}

function startQuiz(){ buildQuiz(); current=0; renderQ(); showScreen('screen-question'); }
function restartQuiz(){ startQuiz(); }

function renderQ(){
  const q=questions[current];
  const hw=document.getElementById('q-hero-wrap');
  const hi=document.getElementById('q-img');
  if(q.img){ hi.src=q.img; hw.classList.add('has-img'); }
  else { hi.src=''; hw.classList.remove('has-img'); }

  document.getElementById('q-label').textContent=`Câu hỏi ${String(current+1).padStart(2,'0')} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.text;

  const row=document.getElementById('q-progress-row'); row.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    let cls='q-dot';
    if(i===current) cls+=' current';
    else if(userAnswers[i]!==null) cls+=(userAnswers[i]===questions[i].correct)?' answered-ok':' answered-wrong';
    d.className=cls; row.appendChild(d);
  });

  const grid=document.getElementById('options-grid'); grid.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'+(userAnswers[current]===i?' picked':'');
    btn.innerHTML=`<span class="opt-letter">${LETTERS[i]}</span>${opt}`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });

  const cb=document.getElementById('btn-confirm');
  const isLast=current===questions.length-1;
  cb.textContent=isLast?'✔ XÁC NHẬN & XEM KẾT QUẢ':'✔ XÁC NHẬN';
  cb.classList.toggle('enabled', userAnswers[current]!==null);
}

function pick(i){ userAnswers[current]=i; renderQ(); }

function confirmAnswer(){
  if(userAnswers[current]===null) return;
  const q=questions[current];
  const chosen=userAnswers[current];
  const isRight=chosen===q.correct;
  if(isRight) score++;

  // ── Show correct or wrong image ──
  popupIsCorrect = isRight;
  const imgCorrect = document.getElementById('popup-img-correct');
  const imgWrong   = document.getElementById('popup-img-wrong');
  imgCorrect.style.display = isRight ? 'block' : 'none';
  imgWrong.style.display   = isRight ? 'none'  : 'block';

  // Image area glow
  const area = document.getElementById('popup-img-area');
  area.className = 'popup-img-area ' + (isRight ? 'is-correct' : 'is-wrong');

  // Badge
  const badge=document.getElementById('popup-badge');
  badge.textContent=isRight?'✓ ĐÚNG RỒI!':'✗ SAI RỒI!';
  badge.className='popup-badge '+(isRight?'correct':'wrong');

  // Question text
  document.getElementById('popup-q-text').textContent=q.text;

  // Answers
  const ar=document.getElementById('popup-answer-row'); ar.innerHTML='';
  if(!isRight){
    const wr=document.createElement('div');
    wr.className='popup-ans wrong-ans';
    wr.innerHTML=`<span class="popup-ans-icon">✗</span><span>Bạn chọn: <strong>${q.opts[chosen]}</strong></span>`;
    ar.appendChild(wr);
  }
  const cr=document.createElement('div');
  cr.className='popup-ans correct-ans';
  cr.innerHTML=`<span class="popup-ans-icon">✓</span><span>Đáp án đúng: <strong>${q.opts[q.correct]}</strong></span>`;
  ar.appendChild(cr);

  // Joke
  const jk=document.getElementById('popup-joke');
  if(q.joke){ jk.textContent=q.joke; jk.style.display='block'; }
  else jk.style.display='none';

  // Next button
  const nb=document.getElementById('popup-next-btn');
  const isLast=current===questions.length-1;
  nb.textContent=isLast?'🏆 Xem kết quả':'Câu tiếp theo →';
  nb.className='popup-next-btn'+(isLast?' last':'');

  document.getElementById('popup-answer').classList.add('open');
}

function nextQ(){
  document.getElementById('popup-answer').classList.remove('open');
  if(current<questions.length-1){ current++; renderQ(); }
  else setTimeout(showResults, 200);
}

function showResults(){
  document.getElementById('res-score-big').innerHTML=`${score}<span>/${questions.length}</span>`;
  const isGood=score>=4;
  document.getElementById('res-title').textContent=isGood?'🏆 FAN CỨNG CHÍNH HIỆU!':'😅 CHƯA ĐỦ LẦN NÀY!';
  document.getElementById('res-sub').textContent=isGood
    ?`Bạn đúng ${score}/5 câu. Xứng đáng nhận khô gà rồi! 🍗`
    :`Bạn đúng ${score}/5 câu. Lần sau cố thêm để nhận khô gà nhé!`;
  document.getElementById('reward-khoga').style.display=isGood?'block':'none';
  document.getElementById('reward-bamia').style.display=isGood?'none':'block';

  const cards=document.getElementById('res-cards'); cards.innerHTML='';
  questions.forEach((q,i)=>{
    const right=userAnswers[i]===q.correct;
    const d=document.createElement('div');
    d.className='res-card';
    d.style.animationDelay=(i*.08)+'s';
    d.style.borderLeft=`3px solid ${right?'#22c55e':'#ef4444'}`;
    d.innerHTML=`
      <div class="res-card-qnum">Câu ${i+1}</div>
      <div class="res-card-q">${q.text}</div>
      <div class="res-answer-row">
        ${right
          ?`<span class="pill your-correct">✓ ${q.opts[userAnswers[i]]}</span>`
          :`<span class="pill your-wrong">✗ ${q.opts[userAnswers[i]]}</span>
            <span class="pill correct-ans">✓ ${q.opts[q.correct]}</span>`
        }
      </div>
      ${q.joke?`<div class="res-card-joke">${q.joke}</div>`:''}
    `;
    cards.appendChild(d);
  });
  showScreen('screen-results');
}

function changeImg(imgId,input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>document.getElementById(imgId).src=e.target.result;
  r.readAsDataURL(f); input.value='';
}

document.getElementById('popup-answer').addEventListener('click',function(e){ if(e.target===this) nextQ(); });
</script>
